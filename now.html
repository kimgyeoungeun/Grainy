<style>:root{--bg-color:#030303;--text-color:#fff;--text-secondary:rgba(255,255,255,0.7);--accent-color:#7ff8ee;--card-bg:#000;--card-hover:#000}*{margin:0;padding:0;box-sizing:border-box}body{max-width:1920px;margin:0 auto;min-width:1200px}.slide-info{position:absolute;bottom:-60px;left:0;right:0;width:100%;transform:translateY(20px);padding:15px 30px;opacity:0;transition:opacity .4s ease,transform .4s ease;pointer-events:none;z-index:10;display:flex;justify-content:center;align-items:center}.slide-info.show{opacity:1;transform:translateY(0)}@media screen and (min-width:1025px){.portfolio-item{min-width:240px;max-width:280px;height:450px}.slide-info-text{font-size:18px}.designer-info{font-size:24px}.close-btn{top:30px;right:30px}.close-btn svg{width:40px;height:40px}}@media screen and (max-width:1024px) and (min-width:769px){.portfolio-item{min-width:calc(50% - 30px);margin-bottom:100px}.portfolio-container{min-height:700px}.slide-info-text{font-size:15px}.designer-info{font-size:18px}.slide-info{position:absolute!important;bottom:-80px!important;left:0!important;right:0!important;width:100%!important;transform:translateY(20px)!important;padding:15px 30px!important;opacity:0!important;transition:opacity .4s ease,transform .4s ease!important;pointer-events:none!important;z-index:10!important;display:flex!important;justify-content:center!important;align-items:center!important;background:rgba(0,0,0,0.8)!important;border-radius:20px!important;backdrop-filter:blur(10px)!important}.slide-info.show{opacity:1!important;transform:translateY(0)!important}}@media screen and (max-width:768px){.portfolio-item{min-width:calc(100% - 30px);margin-bottom:120px}.portfolio-container{min-height:800px}.slide-info-text{font-size:14px}.designer-info{font-size:16px}.slide-info{position:absolute!important;bottom:-100px!important;left:0!important;right:0!important;width:100%!important;transform:translateY(20px)!important;padding:12px 24px!important;opacity:0!important;transition:opacity .4s ease,transform .4s ease!important;pointer-events:none!important;z-index:10!important;display:flex!important;justify-content:center!important;align-items:center!important;background:rgba(0,0,0,0.9)!important;border-radius:15px!important;backdrop-filter:blur(10px)!important;border:1px solid rgba(255,255,255,0.1)!important}.slide-info.show{opacity:1!important;transform:translateY(0)!important}.header{flex-direction:column;align-items:flex-start;gap:20px}.designer-info{margin-left:0}.status{margin-top:10px}}@media screen and (min-width:2560px){body{transform:scale(1.2);transform-origin:top center}.portfolio-item{max-width:300px}}body{font-family:'Inter',sans-serif;background-color:var(--bg-color);color:var(--text-color);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;padding:20px 20px 100px 20px;height:100vh;display:flex;flex-direction:column;cursor:none}a,button,.portfolio-item,.portfolio-image,.nav-btn,.pagination-dot{cursor:none!important}.cursor-dot{width:10px;height:10px;background-color:white;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px 2px rgba(255,255,255,0.8)}.cursor-border{width:50px;height:50px;border:1px solid rgba(255,255,255,0.6);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s ease,height .2s ease}.header{display:flex;justify-content:center;align-items:center;padding:0 20px;margin-bottom:40px;width:100%}.left{display:none}.center{flex:1;display:flex;justify-content:center;align-items:center}.right{display:none}.logo{display:flex;align-items:center;font-size:18px;font-weight:500}.designer-info{text-transform:uppercase;letter-spacing:1px;font-size:20px;text-align:center}.status{display:flex;align-items:center}.status-dot{width:8px;height:8px;background-color:var(--accent-color);border-radius:50%;margin-right:8px}.status-text{text-transform:uppercase;font-size:12px;letter-spacing:1px}.portfolio-container{flex:1;position:relative;overflow:visible;display:flex;align-items:center;pointer-events:auto;min-height:600px}.portfolio-slider{display:flex;transition:transform .5s ease-out;pointer-events:none}.portfolio-item{min-width:calc(33.333% - 30px);margin:0 15px;background-color:var(--card-bg);border-radius:4px;overflow:visible;transition:transform .3s ease,background-color .3s ease,box-shadow .5s ease,border .5s ease;display:flex;flex-direction:column;width:80px;pointer-events:auto;position:relative;margin-bottom:80px}.portfolio-item-content{height:450px;border-radius:4px;overflow:hidden;background-color:var(--card-bg);transition:transform .3s ease,background-color .3s ease,box-shadow .5s ease,border .5s ease;display:flex;flex-direction:column}.portfolio-item:hover .portfolio-item-content{box-shadow:0 0 25px rgba(255,255,255,0.3),0 0 40px rgba(255,255,255,0.15),0 0 60px rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.5)}.portfolio-image{flex:1;width:100%;overflow:hidden;position:relative}.portfolio-image img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}.visit-btn{display:none}.portfolio-info{display:none}.info-left,.info-right{display:none}.site-name{display:none}.slide-info-text{color:white!important;font-weight:500!important;text-align:center!important;letter-spacing:1px!important;text-transform:uppercase!important;white-space:nowrap!important}.nav-buttons{display:none}.nav-btn{width:40px;height:40px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;background:0;color:white;display:flex;align-items:center;justify-content:center;transition:background-color .3s ease}.nav-btn:hover{background-color:rgba(255,255,255,0.1)}.designer-info{padding:0;align-items:center}.info-section{display:flex;padding:10px 15px;font-size:12px;text-transform:uppercase;color:var(--text-secondary)}.info-item{margin-right:30px}.info-value{color:var(--text-color)}.close-btn{position:fixed;top:50px;right:40px;border:0;background:0;padding:0;color:white;font-size:24px;display:flex;align-items:center;justify-content:center;transition:opacity .3s ease;z-index:1000}.close-btn:hover{opacity:.7;background-color:transparent}.pagination{display:flex;justify-content:center;align-items:center;gap:8px;position:fixed;bottom:30px;left:0;right:0;width:100%;z-index:1000}.pagination-dot{width:20px;height:4px;background-color:rgba(255,255,255,0.3);transition:width .3s ease,background-color .3s ease;cursor:pointer}.pagination-dot.active{width:40px;background-color:white}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn 2s ease forwards}.portfolio-video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity .8s ease-in-out;pointer-events:none;transition:opacity .8s ease-in-out,transform .8s ease-in-out,filter .8s ease-in-out}.portfolio-item:hover .portfolio-video{opacity:1;transform:scale(1)}.portfolio-item:hover .portfolio-image img{opacity:0}.portfolio-link{display:block;width:100%;height:100%;text-decoration:none;color:inherit;cursor:none!important}.stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}.spline-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;pointer-events:none}</style>
</head>
<body>
<script type=module src=https://unpkg.com/@splinetool/viewer@1.10.4/build/spline-viewer.js></script>

Explore your Emotions & Memories

</div>

<svg width=24 height=24 viewBox="0 0 24 24" fill=none xmlns=http://www.w3.org/2000/svg>

<script>window.addEventListener('DOMContentLoaded',()=>{document.body.style.opacity='0';setTimeout(()=>{document.body.style.transition='opacity 2.5s ease';document.body.style.opacity='1';},800);});const cursorDot=document.querySelector('.cursor-dot');const cursorBorder=document.querySelector('.cursor-border');document.addEventListener('mousemove',(e)=>{cursorDot.style.left=e.clientX+'px';cursorDot.style.top=e.clientY+'px';setTimeout(()=>{cursorBorder.style.left=e.clientX+'px';cursorBorder.style.top=e.clientY+'px';},50);});document.addEventListener('mousedown',()=>{cursorBorder.style.width='45px';cursorBorder.style.height='45px';});document.addEventListener('mouseup',()=>{cursorBorder.style.width='50px';cursorBorder.style.height='50px';});const portfolioData=[{image:"./img/butterfly.webp",video:"./video/butterfly_v.mp4",url:"./site/3d/butterfly.html",name:"Whispers of Light"},{image:"./img/remix.webp",video:"./video/palette.mp4",url:"./site/3d/remix.html",name:"Palette of Emotion"},{image:"./img/flower.webp",video:"./video/flower.mp4",url:"./site/3d/flower.html",name:"Breath of Emotion"},{image:"./img/1.webp",video:"./video/heart.mp4",url:"./site/blow3.html",name:"Hue of Emotion"},{image:"./img/2.webp",video:"./video/heart1.mp4",url:"./site/heart.html",name:"Part of Emotion"},{image:"./img/memory.webp",video:"./video/memory.mp4",url:"./site/memory.html",name:"Ties of Memory"},{image:"./img/read.webp",video:"./video/readme.mp4",url:"./site/readme.html",name:"Notes of Thought"},{image:"./img/cardd.webp",video:"./video/card.mp4",url:"./site/card.html",name:"Murmur of the Soul"}];const portfolioSlider=document.getElementById('portfolioSlider');const portfolioContainer=document.getElementById('portfolioContainer');const closeBtn=document.getElementById('closeBtn');const pagination=document.getElementById('pagination');let currentIndex=0;let scrollTimeout=null;const extendedData=[...portfolioData,...portfolioData,...portfolioData];function renderPortfolioItems(){portfolioSlider.innerHTML='';extendedData.forEach((item,index)=>{const portfolioItem=document.createElement('div');portfolioItem.className='portfolio-item';portfolioItem.innerHTML=`<div class="portfolio-item-content"><div class="portfolio-image"><img src="${item.image}"alt="${item.name}">${item.video?`<video class="portfolio-video"muted loop playsinline><source src="${item.video}"type="video/mp4"></video>`:''}</div></div><div class="slide-info"><div class="slide-info-text">${item.name}</div></div>`;portfolioItem.addEventListener('click',()=>{if(item.url){window.location.href=item.url;}});const video=portfolioItem.querySelector('.portfolio-video');if(video){video.load();portfolioItem.addEventListener('mouseenter',()=>{video.currentTime=0;const playPromise=video.play();if(playPromise!==undefined){playPromise.catch(error=>{console.log("비디오 재생 에러:",error);});}});portfolioItem.addEventListener('mouseleave',()=>{video.pause();video.currentTime=0;});}
portfolioSlider.appendChild(portfolioItem);});const middleIndex=portfolioData.length;setPositionByIndex(middleIndex);updateActiveSlide();}
function createPagination(){pagination.innerHTML='';for(let i=0;i<portfolioData.length;i++){const dot=document.createElement('div');dot.className='pagination-dot';dot.setAttribute('data-index',i);dot.addEventListener('click',()=>{const middleOffset=Math.floor(extendedData.length/3);setPositionByIndex(middleOffset+i);updateActiveSlide();});pagination.appendChild(dot);}
updatePagination();}
function updatePagination(){updateActiveSlide();}
function updateActiveSlide(){const allSlideInfos=document.querySelectorAll('.slide-info');const actualIndex=currentIndex%portfolioData.length;allSlideInfos.forEach((slideInfo,index)=>{const slideActualIndex=index%portfolioData.length;if(slideActualIndex===actualIndex){slideInfo.classList.add('show');}else{slideInfo.classList.remove('show');}});const dots=document.querySelectorAll('.pagination-dot');dots.forEach((dot,index)=>{if(index===actualIndex){dot.classList.add('active');}else{dot.classList.remove('active');}});}
function setSliderPosition(){const itemWidth=document.querySelector('.portfolio-item').offsetWidth+30;const containerWidth=portfolioContainer.offsetWidth;const centerOffset=containerWidth/2-itemWidth/2;const currentTranslate=-currentIndex*itemWidth+centerOffset;portfolioSlider.style.transform=`translateX(${currentTranslate}px)`;}
function setPositionByIndex(index){currentIndex=index;setSliderPosition();const totalItems=extendedData.length;const originalDataLength=portfolioData.length;if(currentIndex<=0){currentIndex=originalDataLength;setTimeout(()=>{portfolioSlider.style.transition='none';setSliderPosition();setTimeout(()=>{portfolioSlider.style.transition='transform 0.5s ease-out';},50);},500);}
else if(currentIndex>=totalItems-originalDataLength){currentIndex=totalItems-originalDataLength*2;setTimeout(()=>{portfolioSlider.style.transition='none';setSliderPosition();setTimeout(()=>{portfolioSlider.style.transition='transform 0.5s ease-out';},50);},500);}
setTimeout(()=>{updateActiveSlide();},100);}
function handleWheel(event){event.preventDefault();clearTimeout(scrollTimeout);scrollTimeout=setTimeout(()=>{const totalItems=extendedData.length;if(event.deltaY>0){currentIndex++;}else{currentIndex--;}
if(currentIndex<0){currentIndex=0;}
if(currentIndex>=totalItems){currentIndex=totalItems-1;}
setPositionByIndex(currentIndex);},150);}
portfolioSlider.addEventListener('wheel',handleWheel,{passive:false});function setupCursorEffects(){const interactiveElements=document.querySelectorAll('.portfolio-item, .nav-btn, .close-btn, .pagination-dot');interactiveElements.forEach(element=>{element.addEventListener('mouseenter',()=>{cursorBorder.style.width='70px';cursorBorder.style.height='70px';cursorBorder.style.backgroundColor='rgba(255, 255, 255, 0.1)';});element.addEventListener('mouseleave',()=>{cursorBorder.style.width='50px';cursorBorder.style.height='50px';cursorBorder.style.backgroundColor='transparent';});});}
function addEventListeners(){portfolioContainer.addEventListener('wheel',handleWheel,{passive:false});portfolioContainer.addEventListener('dragstart',(e)=>e.preventDefault());portfolioContainer.addEventListener('mouseenter',(e)=>e.stopPropagation());portfolioContainer.addEventListener('mouseover',(e)=>e.stopPropagation());closeBtn.addEventListener('click',()=>{window.location.href="./index.html";});window.addEventListener('resize',()=>{setPositionByIndex(currentIndex);});setupCursorEffects();}
function init(){renderPortfolioItems();createPagination();addEventListeners();const videos=document.querySelectorAll('.portfolio-video');videos.forEach(video=>{video.load();video.pause();});}
document.addEventListener('DOMContentLoaded',()=>{init();});</script>
</body>
