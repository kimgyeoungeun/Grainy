<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grainy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #030303;
            color: #fff;
            overflow-x: hidden;
            cursor: none;
            transition: opacity 1s ease;
        }
        
        a, button, .case-item, .case-link, .case-media, .case-video, .case-image {
            cursor: none !important;
        }
        
        .container {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: 0 2%;
        }
        
        /* 인트로 섹션 스타일 */
        .intro-section {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            opacity: 1; /* 바로 표시되도록 변경 */
            transition: opacity 2s ease;
            pointer-events: auto; /* 클릭 활성화 */
        }
        
        spline-viewer {
            width: 100%;
            height: 100vh;
            display: block;
        }
        
        /* 설명 라벨 */
        .description-label {
            position: absolute;
            left: 50px;
            bottom: 50px;
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        
        /* 클릭 안내 텍스트 */
        .click-anywhere {
            position: absolute;
            right: 50px;
            bottom: 50px;
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.8;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
        
        /* 수정된 intro-description */
        .intro-description {
            position: absolute;
            bottom: 90px;
            left: -800px; /* 처음에는 화면 밖으로 */
            max-width: 800px;
            text-align: left;
            font-weight: 300;
            line-height: 1.7;
            font-size: 1.1rem;
            opacity: 0;
            transition: left 0.5s ease, opacity 0.5s ease;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
            pointer-events: none !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }
        
        /* intro-description이 보이는 상태 */
        .intro-description.visible {
            left: 50px;
            opacity: 0.9;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }
        
        /* 설명란 모든 호버 효과 제거 */
        .intro-description, 
        .intro-description *,
        .site-title {
            pointer-events: none !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        .intro-description:hover,
        .intro-description *:hover,
        .site-title:hover {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background-color: rgba(0, 0, 0, 0.5) !important;
            transform: none !important;
            filter: none !important;
            opacity: 0.9 !important;
        }

        /* 모든 자식 요소들도 호버 효과 제거 */
        .intro-description h1,
        .intro-description p,
        .intro-description h1:hover,
        .intro-description p:hover {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: transparent !important;
            transform: none !important;
            filter: none !important;
        }
        
        .site-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 0.8rem;
            opacity: 0.9;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        /* 커스텀 커서 */
        .cursor-dot {
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
        }
        
        .cursor-border {
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.2s ease, height 0.2s ease, background-color 0.3s ease;
        }
        
        /* 설명 영역 */
        .description-trigger {
            position: absolute;
            left: 0;
            top: 60%;
            width: 600px;
            height: 100%;
            z-index: 10;
        }
        
        /* 애니메이션 */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 0.8;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        /* 전체 화면 오버레이 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            opacity: 0;
            z-index: 9990;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        
        @media (max-width: 480px) {
            .intro-description {
                left: -100%;
                bottom: 30px;
                max-width: calc(100% - 40px);
                font-size: 0.9rem;
            }
            
            .intro-description.visible {
                left: 20px;
            }
            
            .site-title {
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }
            
            .description-label {
                left: 20px;
                bottom: 30px;
            }
            
            .click-anywhere {
                right: 20px;
                bottom: 30px;
                font-size: 1rem;
            }
            
            .description-trigger {
                width: 80px;
            }
        }
    </style>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.86/build/spline-viewer.js"></script>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-border"></div>
    <div class="overlay" id="overlay"></div>
    
    <!-- 인트로 섹션 (Spline 3D Viewer) -->
    <section class="intro-section" id="intro">
        <spline-viewer url="https://prod.spline.design/amQ2FEQbPTIK4-Mx/scene.splinecode"></spline-viewer>
        
        <!-- 설명 트리거 영역 -->
        <div class="description-trigger" id="descriptionTrigger"></div>
        
        <!-- 설명 라벨 -->
        <div class="description-label">EXPLANATION</div>
        
        <!-- 클릭 안내 텍스트 -->
        <div class="click-anywhere">CLICK ANYWHERE</div>
        
        <!-- 숨겨진 설명 섹션 -->
        <div class="intro-description" id="introDescription">
            <h1 class="site-title">Grainy</h1>
            <p>흐릿하고 거칠지만, 분명히 존재하는 기억과 감정의 잔상.<br>시간이 흐를수록 선명했던 기억은 점점 거칠고 불분명해지지만, 그 결이 남아 우리 안에 머문다.<br>"Grainy"는 그런 흐려진 기억과 감정의 입자들을 포착하고, 그 순간의 질감과 온도를 조심스럽게 꺼내어 보여주는 사이트입니다.</p>
        </div>
    </section>
    

    <script>
        // 페이지 로딩 시
        window.addEventListener('DOMContentLoaded', () => {
            const introSection = document.getElementById('intro');
            const introDescription = document.getElementById('introDescription');
            const descriptionTrigger = document.getElementById('descriptionTrigger');
            
            // 클릭 가능하도록 설정
            let clickEnabled = true;
            
            // 설명 영역에 마우스오버 시 설명 표시
            descriptionTrigger.addEventListener('mouseenter', () => {
                introDescription.classList.add('visible');
            });
            
            // 설명 영역에서 마우스아웃 시 설명 숨김
            descriptionTrigger.addEventListener('mouseleave', () => {
                introDescription.classList.remove('visible');
            });
        });
        
        // 커스텀 커서 기능
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorBorder = document.querySelector('.cursor-border');
        const overlay = document.getElementById('overlay');
        const descriptionTrigger = document.getElementById('descriptionTrigger');

        document.addEventListener('mousemove', (e) => {
            // 커서 위치 업데이트
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
            
            // 테두리 커서 위치 업데이트 (약간의 지연 효과)
            setTimeout(() => {
                cursorBorder.style.left = e.clientX + 'px';
                cursorBorder.style.top = e.clientY + 'px';
            }, 50);
        });

        // 클릭 시 테두리 크기 변화 애니메이션
        document.addEventListener('mousedown', () => {
            cursorBorder.style.width = '45px';
            cursorBorder.style.height = '45px';
        });

        document.addEventListener('mouseup', () => {
            cursorBorder.style.width = '50px';
            cursorBorder.style.height = '50px';
        });
        
        // 이미 이동 중인지 체크하는 변수
        let isNavigating = false;
        
        // 페이지 전체에 클릭 이벤트 추가 - 오버레이로 페이드 아웃 후 페이지 이동
        document.addEventListener('click', function(e) {
            // 이미 이동 중이면 무시
            if (isNavigating) return;
            
            // 설명 트리거 영역에서 클릭한 경우 페이지 이동 방지
            if (e.target === descriptionTrigger || descriptionTrigger.contains(e.target)) {
                return;
            }
            
            isNavigating = true;
            const targetUrl = "./now.html"; // 이동할 URL
            
            // 오버레이를 보이게 함 (완전히 검은색으로)
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'auto'; // 추가 클릭 방지
            
            // 커서 숨기기
            cursorDot.style.opacity = '0';
            cursorBorder.style.opacity = '0';
            
            // 트랜지션 완료 후 페이지 이동
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000); // 1초 후 이동 (overlay의 transition 시간과 동일하게 설정)
        });
    </script>
</body>
</html>
