<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murmur of the soul</title>
    <style>
        @font-face {
    font-family: 'Pretendard-Regular';
    src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: none;
            background-color: black;
        }

        /* 커스텀 커서 스타일 */
        .cursor-dot {
          width: 10px;
          height: 10px;
          background-color: white;
          border-radius: 50%;
          position: fixed;
          pointer-events: none;
          z-index: 9999;
          transform: translate(-50%, -50%);
          box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
        }

        .cursor-border {
          width: 50px;
          height: 50px;
          border: 1px solid rgba(255, 255, 255, 0.6);
          border-radius: 50%;
          position: fixed;
          pointer-events: none;
          z-index: 9998;
          transform: translate(-50%, -50%);
          transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease;
        }

        /* 모든 클릭 가능한 요소에 cursor: none 적용 */
        a, button, .grid-item, .thumbnail, .switch-button, .back-button {
          cursor: none !important;
        }

        /* 네비게이션 바 스타일 */
        .navigation-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 200;
            gap: 20px;
        }

        .back-button {
            display: flex;
            align-items: center;
            color: rgb(255, 255, 255);
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: none;
        }

        .back-button:hover {
            opacity: 1;
        }

        .back-button svg {
            width: 16px;
            height: 16px;
            margin-right: 6px;
        }

        .breadcrumb {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            color: rgb(255, 255, 255);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb a {
            color: rgb(255, 255, 255);
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: none;
        }

        .breadcrumb a:hover {
            color: rgb(255, 255, 255);
        }

        .separator {
            color: rgb(255, 255, 255);
        }

        .current-page {
            color: rgb(255, 255, 255);
        }

        /* 사이트 설명 스타일 */
        .site-description {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            color: rgba(0, 0, 0, 0.8);
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            line-height: 1.4;

            padding: 10px 20px;



            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }



        .site-description p {
            font-size: 11px;
            color: rgb(255, 255, 255);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(2, 1fr);
            height: 100vh;
            width: 100vw;
            gap: 0;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .grid-item:hover img {
            transform: scale(1.1);
        }

        /* 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        .modal.closing {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .modal-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: block; /* flex에서 block으로 변경 */
            background: rgba(0, 0, 0, 0);
            transform: scale(0.9);
            transition: transform 0.6s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal.closing .modal-content {
            transform: scale(1);
        }

        .modal-info {
            position: fixed; /* absolute에서 fixed로 변경 */
            left: 60px;
            bottom: 80px; /* top 대신 bottom 사용으로 절대 위치 고정 */
            width: auto;
            max-width: none;

            background: #00000000;
            border-right: 1px solid #eeeeee00;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 하단 정렬 */
            align-items: flex-start;
            overflow-y: auto;
            z-index: 1003; /* 높은 z-index */
            padding: 20px;
        }

        .modal-image {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); /* 화면 정중앙에 위치 */
            width: calc(100vw - 440px); /* 양쪽 여백 고려한 너비 (350px + 90px) */
            height: 80vh; /* 적절한 높이 설정 */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00000000;
            z-index: 1002; /* 중간 z-index */
        }

        .modal-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal-thumbnails {
            position: absolute;
            right: 60px;
            top: 0;
            width: 90px;
            height: 100vh;
            background: #00000000;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 세로 중앙 정렬 */
            align-items: center; /* 가로 중앙 정렬 */
            gap: 6px;
            overflow-y: auto;
            border-radius: 5px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
            z-index: 1004; /* 가장 높은 z-index */
        }

        .modal-info > div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .modal-info::-webkit-scrollbar {
            display: none;
            width: 0;
        }

        .modal-info::-webkit-scrollbar-track {
            display: none;
            background: transparent;
        }

        .modal-info::-webkit-scrollbar-thumb {
            display: none;
            background: transparent;
        }

        .modal-thumbnails::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
            width: 0;
            background: transparent;
        }

        .modal-thumbnails::-webkit-scrollbar-track {
            display: none;
            background: transparent;
        }

        .modal-thumbnails::-webkit-scrollbar-thumb {
            display: none;
            background: transparent;
        }

        .modal-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .modal-info p {
            font-size: 14px;
            color: #ffffff;
            line-height: 1.4;
        }

        .thumbnail {
            width: 74px;
            height: 54px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            flex-shrink: 0;
            border-radius: 5px;
            opacity: 0;
            transform: translateX(30px) scale(0.8);
            animation: slideIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
            border: 2px;
        }

        .thumbnail:hover {
            transform: scale(1.05);
        }

        .thumbnail.active {
            border-color: #ffffff;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 30px;
            font-weight: bold;
            color: white;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .close-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: scale(1.1);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        /* 컬러 팔레트 영역 */
        .color-palette {
            position: fixed;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease;
        }

        .modal.active .color-palette {
            opacity: 1;
            visibility: visible;
        }

        .palette-title {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            color: white;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .color-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            margin-left: 250px;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideInLeft 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideInLeft {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .color-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.801);
            flex-shrink: 0;
        }

        /* 설명 텍스트 스타일 */
        .description {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Pretendard', sans-serif;
            z-index: 100;
            pointer-events: none;
            line-height: 1.8;
        }

       body {
    opacity: 0;
    animation: fadeIn 3s ease-out forwards;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
} 
.color-text {

/* ✅ 큰 해상도 대응 (예: 1920px 이상) */
@media screen and (min-width: 1920px) {

    left: 80px;

  .modal-thumbnails {
    right: 80px;
    width: 100px;

    width: calc(100vw - 500px); /* 좌우 여백 반영 */
    height: 80vh;
  }
}

/* ✅ 중간 데스크탑 해상도 (예: 1280px ~ 1919px) */
@media screen and (max-width: 1919px) and (min-width: 1280px) {
  .modal-info {
    left: 40px;
    width: 500px;
  }

  .modal-thumbnails {
    right: 40px;
    width: 80px;
  }

  .modal-image {
    width: calc(100vw - 400px);
    height: 75vh;
  }

  .color-palette {
    left: 20px;
  }
}

/* ✅ 작은 데스크탑/태블릿 대응 (1024px ~ 1279px) */
@media screen and (max-width: 1279px) {
  .modal-info {
    left: 30px;
    width: 420px;
  }

  .modal-thumbnails {
    right: 30px;
    width: 70px;
  }

  .modal-image {
    width: calc(100vw - 320px);
    height: 70vh;
  }

  .description {
    font-size: 12px;
  }

  .color-text {
    font-size: 12px;
  }

  .modal-info h3 {
    font-size: 16px;
  }

  .modal-info p {
    font-size: 13px;
  }
}

/* ✅ 태블릿 이하 작은 화면 (768px ~ 1023px) */
@media screen and (max-width: 1023px) {
  .modal-info {
    display: none;
  }

  .modal-thumbnails {
    display: none;
  }

  .color-palette {
    display: none;
  }

  .modal-image {
    width: 90vw;
    height: 80vh;
  }

  .description {
    font-size: 11px;
  }
}

/* ✅ 모바일 대응 (최소) */
@media screen and (max-width: 767px) {
  .grid-container {
    grid-template-columns: repeat(2, 1fr);

  }

  .modal-image {
    width: 95vw;

  }

  .description {
    font-size: 10px;
  }

  .close-btn {
    top: 10px;
    right: 10px;
    font-size: 24px;
  }
}

    <script>
        // 커스텀 커서 초기화 함수
        function initCursor() {
          const cursorDot = document.querySelector('.cursor-dot');
          const cursorBorder = document.querySelector('.cursor-border');

          // 마우스 움직임 추적
          document.addEventListener('mousemove', (e) => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
            
            // 테두리 커서는 약간의 지연 효과
            setTimeout(() => {
              cursorBorder.style.left = e.clientX + 'px';
              cursorBorder.style.top = e.clientY + 'px';
            }, 50);
          });

          // 마우스 클릭 시 효과
          document.addEventListener('mousedown', () => {
            cursorBorder.style.width = '45px';
            cursorBorder.style.height = '45px';
          });

          document.addEventListener('mouseup', () => {
            cursorBorder.style.width = '50px';
            cursorBorder.style.height = '50px';
          });

          // 인터랙티브 요소에 호버 효과
          const interactiveElements = document.querySelectorAll('.thumbnail, .back-button, .breadcrumb a, .close-btn');
          
          interactiveElements.forEach(element => {
            element.addEventListener('mouseenter', () => {
              cursorBorder.style.width = '70px';
              cursorBorder.style.height = '70px';
              cursorBorder.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
            });
            
            element.addEventListener('mouseleave', () => {
              cursorBorder.style.width = '50px';
              cursorBorder.style.height = '50px';
              cursorBorder.style.backgroundColor = 'transparent';
            });
          });
        }

                colors: [
                    { hex: '#093144', name: '#093144' },
                    { hex: '#B6CFF5', name: '#B6CFF5' },

        let currentImageIndex = 0;
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalDescription = document.getElementById('modal-description');
        const thumbnailsContainer = document.getElementById('thumbnails');

        // 페이지 로드 시 커서 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initCursor();
        });

        function openModal(index) {
            currentImageIndex = index;
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
            showImage(index);
            createThumbnails();
        }

        function closeModal() {
            modal.classList.add('closing');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.classList.remove('closing');
            }, 600);
        }

        function showImage(index) {
            const imageInfo = imageData[index];
            modalImg.src = imageInfo.src;
            modalTitle.textContent = imageInfo.title;
            modalDescription.innerHTML = imageInfo.description;
            updateActiveThumbnail(index);
            updateColorPalette(imageInfo.colors);
        }

        function updateColorPalette(colors) {
            const colorItemsContainer = document.getElementById('color-items');
            colorItemsContainer.innerHTML = '';
            
            colors.forEach((color, index) => {
                const colorItem = document.createElement('div');
                colorItem.className = 'color-item';
                colorItem.style.animationDelay = `${index * 0.1}s`;
                
                colorItem.innerHTML = `
                    <div class="color-circle" style="background-color: ${color.hex}"></div>
                    <div class="color-text">${color.name}</div>
                `;
                
                colorItemsContainer.appendChild(colorItem);
            });
        }

        function createThumbnails() {
            thumbnailsContainer.innerHTML = '';
            imageData.forEach((imageInfo, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumbnail';
                thumb.innerHTML = `<img src="${imageInfo.src}" alt="썸네일 ${index + 1}">`;
                thumb.onclick = () => {
                    currentImageIndex = index;
                    showImage(index);
                };
                
                // 시간차를 두고 애니메이션 실행
                thumb.style.animationDelay = `${index * 0.08}s`;
                
                thumbnailsContainer.appendChild(thumb);
            });
            updateActiveThumbnail(currentImageIndex);
        }

        function updateActiveThumbnail(index) {
            const thumbnails = document.querySelectorAll('.thumbnail');
            thumbnails.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % imageData.length;
            showImage(currentImageIndex);
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + imageData.length) % imageData.length;
            showImage(currentImageIndex);
        }

        // 키보드 네비게이션
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // 마우스 휠 네비게이션
        document.addEventListener('wheel', (e) => {
            if (!modal.classList.contains('active')) return;
            
            e.preventDefault(); // 기본 스크롤 동작 방지
            
            if (e.deltaY > 0) {
                // 아래로 스크롤 = 다음 이미지
                nextImage();
            } else {
                // 위로 스크롤 = 이전 이미지
                prevImage();
            }
        });
    </script>
